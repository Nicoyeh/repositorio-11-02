<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Digital de 11-02</title>
<meta name="description" content="Biblioteca digital del curso: guías, talleres, diapositivas y exámenes organizados por materia y período.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- =====================================================
     HERO / PORTADA
     La imagen se referencia en assets/img/colegio.jpg
     Mientras no exista, se ve un degradado institucional de reemplazo.
====================================================== -->
<header class="hero">
  <div class="hero-media" aria-hidden="true"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">Colegio Loperena</p>
    <h1>Repositorio de 11-02</h1>
    <p class="hero-subtitle">Encuentra fácilmente guías, talleres, diapositivas y exámenes organizados por materia y período académico.</p>
  </div>
</header>

<!-- Panel de búsqueda flotante, sobrepuesto al borde del hero -->
<div class="wrap">
  <section class="search-panel" aria-label="Buscar documentos">
    <div class="search-field">
      <svg class="ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.3" y2="16.3"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar un documento por nombre…" autocomplete="off">
      <button id="clearSearch" class="icon-btn hidden" title="Limpiar búsqueda" aria-label="Limpiar búsqueda">
        <svg class="ic" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="search-filters">
      <label class="filter-select">
        <span>Materia</span>
        <select id="filterSubject">
          <option value="">Todas</option>
        </select>
      </label>
      <label class="filter-select">
        <span>Período</span>
        <select id="filterPeriod">
          <option value="">Todos</option>
        </select>
      </label>
      <button id="resetFilters" class="btn-ghost small hidden">Limpiar filtros</button>
    </div>
  </section>

  <!-- =====================================================
       MIGAS DE PAN
  ====================================================== -->
  <nav class="breadcrumb" id="breadcrumb" aria-label="Ruta de navegación"></nav>

  <!-- =====================================================
       VISTA: RESULTADOS DE BÚSQUEDA / FILTROS
  ====================================================== -->
  <section id="view-results" class="view">
    <div class="section-title">
      <h2>Resultados</h2>
      <span class="count" id="resultsCount"></span>
    </div>
    <div class="doc-grid" id="resultsGrid"></div>
  </section>

  <!-- =====================================================
       VISTA: PÁGINA PRINCIPAL (materias)
  ====================================================== -->
  <section id="view-home" class="view active">
    <div class="section-title">
      <h2>Materias</h2>
      <span class="count" id="subjectCount"></span>
    </div>
    <div class="subject-grid" id="subjectGrid"></div>
  </section>

  <!-- =====================================================
       VISTA: MATERIA (carpetas)
  ====================================================== -->
  <section id="view-subject" class="view">
    <button class="btn-back" id="backFromSubject">
      <svg class="ic" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Volver
    </button>
    <div class="entity-header">
      <div class="entity-icon" id="subjectIcon"></div>
      <div>
        <h2 id="subjectName"></h2>
        <p class="entity-desc" id="subjectDesc"></p>
      </div>
    </div>
    <div class="section-title small">
      <h3>Carpetas</h3>
      <span class="count" id="folderCount"></span>
    </div>
    <div class="folder-grid" id="folderGrid"></div>
  </section>

  <!-- =====================================================
       VISTA: CARPETA (períodos + documentos)
  ====================================================== -->
  <section id="view-folder" class="view">
    <button class="btn-back" id="backFromFolder">
      <svg class="ic" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Volver
    </button>
    <div class="entity-header">
      <div class="entity-icon" id="folderIcon"></div>
      <div>
        <h2 id="folderTitle"></h2>
        <p class="entity-desc" id="folderSubtitle"></p>
      </div>
    </div>

    <div class="period-tabs" id="periodTabs" role="tablist"></div>
    <div class="doc-grid" id="docGrid"></div>
  </section>
</div>

<footer class="site-footer">
  <div class="wrap">
    <p>Repositorio 11-02 · Colegio Loperena</p>
  </div>
</footer>

<script src="js/app.js"></script>
</body>
</html>
